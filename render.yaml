services:
  - type: web
    name: the-pipeline
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: SITE_URL
        value: https://thepipeline.dev
      - key: SITE_TITLE
        value: The Pipeline
